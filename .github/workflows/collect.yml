name: Collect Raw Data

on:
  workflow_dispatch:
    inputs:
      date:
        description: "대상 날짜 (YYYY-MM-DD, 미입력 시 UTC 오늘)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests feedparser

      - name: Collect
        env:
          TARGET_DATE: ${{ inputs.date }}
        run: python scripts/collect_data.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add inbox/
          if git diff --cached --quiet; then
            echo "변경 없음"
            exit 0
          fi
          DATE="${TARGET_DATE:-$(date -u +%Y-%m-%d)}"
          git commit -m "chore: raw data ${DATE}"
          git push origin main
        env:
          TARGET_DATE: ${{ inputs.date }}
