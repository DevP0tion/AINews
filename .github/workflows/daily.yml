name: Daily Report

on:
  schedule:
    # 매일 07:00 KST = 22:00 UTC (전날)
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "대상 날짜 (YYYY-MM-DD, 미입력 시 KST 오늘)"
        required: false
        default: ""

concurrency:
  group: daily-report
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write    # claude-code-action이 OIDC 토큰을 요구
  pull-requests: write  # Claude가 필요시 PR/이슈 조작할 때 사용

jobs:
  # ---------------------------------------------------------------------------
  # 1. 결정론적 소스 수집 → inbox/YYYY-MM-DD-raw.json 커밋
  # ---------------------------------------------------------------------------
  collect:
    runs-on: ubuntu-latest
    outputs:
      target_date: ${{ steps.resolve.outputs.date }}
      inbox_path: ${{ steps.resolve.outputs.inbox }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Resolve target date (KST)
        id: resolve
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            DATE="${{ inputs.date }}"
          else
            DATE=$(TZ="Asia/Seoul" date +%Y-%m-%d)
          fi
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"
          echo "inbox=inbox/${DATE}-raw.json" >> "$GITHUB_OUTPUT"
          echo "TARGET_DATE=${DATE}" >> "$GITHUB_ENV"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests feedparser

      - name: Collect raw data
        run: python scripts/collect_data.py

      - name: Commit raw data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add inbox/
          if git diff --cached --quiet; then
            echo "변경 없음 (이미 같은 파일 존재)"
            exit 0
          fi
          git commit -m "chore: raw data ${TARGET_DATE}"
          git push origin main

  # ---------------------------------------------------------------------------
  # 2. Claude가 inbox 읽어서 AI 처리 → archive/state 커밋 (main에 직접)
  # ---------------------------------------------------------------------------
  curate:
    needs: collect
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    env:
      TARGET_DATE: ${{ needs.collect.outputs.target_date }}
      INBOX_PATH: ${{ needs.collect.outputs.inbox_path }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Load prompt
        id: prompt
        run: |
          # curate_prompt.md에 런타임 변수 치환 후 env로 전달
          PROMPT=$(sed \
            -e "s|{{TARGET_DATE}}|${TARGET_DATE}|g" \
            -e "s|{{INBOX_PATH}}|${INBOX_PATH}|g" \
            .github/curate_prompt.md)
          {
            echo "prompt<<CURATE_PROMPT_EOF"
            echo "$PROMPT"
            echo "CURATE_PROMPT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: ${{ steps.prompt.outputs.prompt }}
          claude_args: |
            --allowedTools Bash,Read,Write,Edit,WebFetch,WebSearch

  # ---------------------------------------------------------------------------
  # 3. Discord 전송 — archive/*.json을 읽어서 webhook으로
  # ---------------------------------------------------------------------------
  publish:
    needs: [collect, curate]
    runs-on: ubuntu-latest
    env:
      REPORT_DATE: ${{ needs.collect.outputs.target_date }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Send to Discord
        env:
          DISCORD_WEBHOOK_POTIONBOT_NEWS: ${{ secrets.DISCORD_WEBHOOK_POTIONBOT_NEWS }}
        run: python scripts/send_discord.py
