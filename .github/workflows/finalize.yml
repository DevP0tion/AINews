name: Finalize Daily Report

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Routine이 생성한 claude/daily-YYYY-MM-DD 브랜치"
        required: true
      date:
        description: "리포트 날짜 (YYYY-MM-DD)"
        required: true

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Send Discord
        env:
          DISCORD_WEBHOOK_POTIONBOT_NEWS: ${{ secrets.DISCORD_WEBHOOK_POTIONBOT_NEWS }}
          REPORT_DATE: ${{ inputs.date }}
        run: python scripts/send_discord.py

      - name: Merge to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git merge --no-ff --no-edit "${{ inputs.branch }}" -m "chore: merge ${{ inputs.date }} report"
          git push origin main

      - name: Delete source branch
        run: git push origin --delete "${{ inputs.branch }}"
